<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <circle cx="80"  cy="80"  r="12" fill="white" opacity="0.15"/>
  <circle cx="432" cy="80"  r="8"  fill="white" opacity="0.12"/>
  <circle cx="60"  cy="420" r="8"  fill="white" opacity="0.10"/>
  <circle cx="440" cy="430" r="14" fill="white" opacity="0.12"/>
  <circle cx="150" cy="440" r="6"  fill="#f59e0b" opacity="0.5"/>
  <circle cx="370" cy="60"  r="6"  fill="#f59e0b" opacity="0.5"/>

  <!-- Gold coin -->
  <circle cx="256" cy="235" r="148" fill="url(#coin)"/>
  <circle cx="256" cy="235" r="128" fill="#fde68a" opacity="0.25"/>

  <!-- Shine on coin -->
  <ellipse cx="205" cy="180" rx="38" ry="22" fill="white" opacity="0.22" transform="rotate(-35 205 180)"/>

  <!-- ₪ symbol -->
  <text x="256" y="315"
        text-anchor="middle"
        font-size="195"
        font-weight="bold"
        font-family="Arial Hebrew, Arial, sans-serif"
        fill="#78350f">₪</text>

  <!-- Stars bottom -->
  <polygon points="110,395 118,420 145,420 123,436 131,461 110,445 89,461 97,436 75,420 102,420"
           fill="#f59e0b" opacity="0.85"/>
  <polygon points="402,390 408,408 428,408 412,420 418,438 402,426 386,438 392,420 376,408 396,408"
           fill="#f59e0b" opacity="0.7"/>
</svg>
